name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --cap-add=NET_ADMIN
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git cmake make gcc pkgconf qt6-base yaml-cpp gtest iproute2 procps-ng

      - uses: actions/checkout@v7

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCONWATCH_BUILD_TESTS=ON .

      - name: Build
        run: cmake --build build

      - name: Unit tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Integration tests (netlink + process lifecycle)
        run: ./tests/integration_netlink_test.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: conwatch-linux-x86_64
          path: |
            build/conwatch
            build/conwatch-tray
          retention-days: 90
