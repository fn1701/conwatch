---
# Pre-commit hooks configuration
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files
# Update: pre-commit autoupdate

repos:
  # Git checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
      - id: check-yaml
        name: Check YAML syntax
      - id: check-added-large-files
        name: Check for large files
        args: ["--maxkb=3000"]
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-json
        name: Check JSON syntax
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: ["--fix=lf"]

  # C++ formatting with clang-format
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.8
    hooks:
      - id: clang-format
        name: Format C++ code with clang-format
        types: [c++]
        args: ["-i"]
        stages: [pre-commit]

  # clang-tidy's driver hard-rejects a couple of GCC-only flags that
  # Qt6's CMake config injects for the real g++ build (see
  # scripts/filter-compile-commands.py) -- strip them into a separate
  # compile database before clang-tidy runs.
  - repo: local
    hooks:
      - id: filter-compile-commands
        name: Strip GCC-only flags for clang-tidy
        entry: scripts/filter-compile-commands.py build/compile_commands.json build/clang-tidy/compile_commands.json
        language: system
        pass_filenames: false
        types: [c++]
        stages: [pre-commit]

  # C++ linting with clang-tidy
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-tidy
        name: Lint C++ code with clang-tidy
        types: [c++]
        args: ["--format-style=file", "-p=build/clang-tidy"]
        stages: [pre-commit]

  # YAML and Markdown
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: Lint YAML files
        args: [
            "--config-data",
            "{rules: {line-length: {max: 200}, comments:
            {min-spaces-from-content: 2}}}",
          ]

  # General
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: name-tests-test
        name: Check test file naming
        exclude: ^helpers/tests/.*
